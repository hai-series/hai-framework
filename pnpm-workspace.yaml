# =============================================================================
# hai Admin Framework - pnpm Workspace 配置
# =============================================================================
# 定义 Monorepo 工作区结构和依赖版本统一管理
#
# @see https://pnpm.io/workspaces
# @see https://pnpm.io/catalogs
# =============================================================================

packages:
  # 核心包
  - "packages/*"
  # 应用
  - "apps/*"

# =============================================================================
# 依赖版本统一管理 (Catalog)
# =============================================================================
# 使用 catalog: 协议引用统一版本，例如：
#   dependencies:
#     zod: "catalog:"
#     typescript: "catalog:"
# =============================================================================
catalog:
  # -----------------------------------------------------------------------------
  # TypeScript & 构建工具
  # -----------------------------------------------------------------------------
  typescript: "^5.7.2"
  tsup: "^8.3.5"
  vitest: "^2.1.8"
  rimraf: "^6.0.1"

  # -----------------------------------------------------------------------------
  # Node.js 类型
  # -----------------------------------------------------------------------------
  "@types/node": "^22.10.2"

  # -----------------------------------------------------------------------------
  # Svelte & SvelteKit
  # -----------------------------------------------------------------------------
  svelte: "^5.16.0"
  "@sveltejs/kit": "^2.15.0"
  "@sveltejs/adapter-auto": "^3.3.1"
  "@sveltejs/vite-plugin-svelte": "^5.0.3"
  "@sveltejs/package": "^2.3.7"
  svelte-check: "^4.1.2"
  vite: "^6.0.7"

  # -----------------------------------------------------------------------------
  # 验证 & 配置
  # -----------------------------------------------------------------------------
  zod: "^3.24.1"
  yaml: "^2.7.0"

  # -----------------------------------------------------------------------------
  # 日志
  # -----------------------------------------------------------------------------
  pino: "^9.6.0"
  pino-pretty: "^13.0.0"

  # -----------------------------------------------------------------------------
  # ID 生成
  # -----------------------------------------------------------------------------
  nanoid: "^5.0.9"

  # -----------------------------------------------------------------------------
  # 加密
  # -----------------------------------------------------------------------------
  sm-crypto: "^0.3.13"
  "@noble/hashes": "^1.6.1"
  jose: "^5.9.6"

  # -----------------------------------------------------------------------------
  # 数据库
  # -----------------------------------------------------------------------------
  drizzle-orm: "^0.38.3"
  drizzle-kit: "^0.30.1"
  better-sqlite3: "^11.7.0"
  "@types/better-sqlite3": "^7.6.12"
  postgres: "^3.4.5"
  mysql2: "^3.11.5"

  # -----------------------------------------------------------------------------
  # AI
  # -----------------------------------------------------------------------------
  openai: "^4.77.0"
  "@modelcontextprotocol/sdk": "^1.0.4"

  # -----------------------------------------------------------------------------
  # CLI 工具
  # -----------------------------------------------------------------------------
  cac: "^6.7.14"
  chalk: "^5.4.1"
  prompts: "^2.4.2"
  ora: "^8.1.1"
  fs-extra: "^11.2.0"
  glob: "^10.4.5"
  handlebars: "^4.7.8"
  "@types/fs-extra": "^11.0.4"
  "@types/prompts": "^2.4.9"

  # -----------------------------------------------------------------------------
  # UI (Tailwind CSS & DaisyUI & FlyonUI & Icons)
  # -----------------------------------------------------------------------------
  tailwindcss: "^4.0.0"
  "@tailwindcss/vite": "^4.0.0"
  daisyui: "^5.0.0"
  flyonui: "^1.3.0"
  "@iconify/tailwind": "^1.2.0"
  "@iconify-json/tabler": "^1.2.15"
  "@iconify-json/lucide": "^1.2.25"

  # -----------------------------------------------------------------------------
  # ESLint & Prettier
  # -----------------------------------------------------------------------------
  "@antfu/eslint-config": "^3.14.0"
  eslint: "^9.18.0"
  prettier: "^3.4.2"

  # -----------------------------------------------------------------------------
  # Git Hooks & Changesets
  # -----------------------------------------------------------------------------
  husky: "^9.1.7"
  lint-staged: "^15.3.0"
  "@changesets/cli": "^2.27.12"

  # -----------------------------------------------------------------------------
  # Turbo
  # -----------------------------------------------------------------------------
  turbo: "^2.3.3"
