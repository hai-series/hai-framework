shellEmulator: true

trustPolicy: no-downgrade

# =============================================================================
# hai Framework - pnpm Workspace 配置
# =============================================================================
# 定义 Monorepo 工作区结构和依赖版本统一管理
#
# @see https://pnpm.io/workspaces
# @see https://pnpm.io/catalogs
# =============================================================================

packages:
  # 核心包
  - 'packages/*'
  # 应用
  - 'apps/*'

# =============================================================================
# 依赖版本统一管理 (Catalog)
# =============================================================================
# 使用 catalog: 协议引用统一版本，例如：
#   dependencies:
#     zod: "catalog:"
# =============================================================================
catalog:
  # ---------------------------------------------------------------------------
  # 对象存储 (S3 协议)
  # ---------------------------------------------------------------------------

  '@antfu/eslint-config': ^7.2.0
  '@aws-sdk/client-s3': ^3.723.0
  '@aws-sdk/s3-request-presigner': ^3.723.0

  '@capacitor/android': ^7.0.0
  '@capacitor/app': ^7.0.0
  '@capacitor/camera': ^7.0.0
  '@capacitor/cli': ^7.0.0
  '@capacitor/core': ^7.0.0
  '@capacitor/device': ^7.0.0
  '@capacitor/preferences': ^7.0.0
  '@capacitor/push-notifications': ^7.0.0
  '@capacitor/status-bar': ^7.0.0

  '@iconify-json/tabler': ^1.2.15
  '@iconify/tailwind4': ^1.0.7

  # ---------------------------------------------------------------------------
  # i18n
  # ---------------------------------------------------------------------------
  '@inlang/paraglide-js': ^2.0.0
  '@inlang/plugin-message-format': ^4.2.0

  # ---------------------------------------------------------------------------
  # UI (Tailwind CSS / DaisyUI / Bits UI / Icons)
  # ---------------------------------------------------------------------------
  '@internationalized/date': ^3.8.0
  '@modelcontextprotocol/sdk': ^1.26.0

  '@playwright/test': ^1.58.2
  '@sveltejs/adapter-auto': ^7.0.0
  '@sveltejs/adapter-node': ^5.0.0
  '@sveltejs/adapter-static': ^3.0.0
  '@sveltejs/kit': ^2.15.0
  '@sveltejs/package': ^2.3.7
  '@sveltejs/vite-plugin-svelte': ^7.0.0

  '@tailwindcss/vite': ^4.0.0
  '@types/better-sqlite3': ^7.6.12
  '@types/fs-extra': ^11.0.4
  # ---------------------------------------------------------------------------
  # Node.js 类型
  # ---------------------------------------------------------------------------
  '@types/node': ^25.1.0
  '@types/nodemailer': ^7.0.11
  '@types/pg': ^8.11.10
  '@types/prompts': ^2.4.9
  # ---------------------------------------------------------------------------
  # 数据库
  # ---------------------------------------------------------------------------
  better-sqlite3: ^12.6.2
  bits-ui: ^2.8.0
  # ---------------------------------------------------------------------------
  # CLI 工具
  # ---------------------------------------------------------------------------
  cac: ^6.7.14
  chalk: ^5.4.1
  croner: ^10.0.1
  daisyui: ^5.0.0
  # ---------------------------------------------------------------------------
  # ESLint (已内置代码格式化，无需 Prettier)
  # ---------------------------------------------------------------------------
  eslint: ^9.18.0
  eslint-plugin-format: ^1.3.1

  fs-extra: ^11.2.0
  handlebars: ^4.7.8
  # ---------------------------------------------------------------------------
  # Markdown & Syntax Highlighting
  # ---------------------------------------------------------------------------
  highlight.js: ^11.11.0

  # ---------------------------------------------------------------------------
  # Git Hooks & 其他工具
  # ---------------------------------------------------------------------------
  husky: ^9.1.7
  # ---------------------------------------------------------------------------
  # 缓存
  # ---------------------------------------------------------------------------
  ioredis: ^5.4.2

  jsdom: ^27.4.0
  lint-staged: ^16.2.7
  loglevel: ^1.9.2
  marked: ^15.0.0

  mysql2: ^3.11.5

  # ---------------------------------------------------------------------------
  # ID 生成 & 验证 & 配置
  # ---------------------------------------------------------------------------
  nanoid: ^5.0.9
  # ---------------------------------------------------------------------------
  # 邮件
  # ---------------------------------------------------------------------------
  nodemailer: ^8.0.1
  # ---------------------------------------------------------------------------
  # AI
  # ---------------------------------------------------------------------------
  openai: ^6.17.0
  ora: ^9.1.0
  pg: ^8.13.1
  # ---------------------------------------------------------------------------
  # 日志
  # ---------------------------------------------------------------------------
  pino: ^10.3.0
  pino-pretty: ^13.0.0
  prompts: ^2.4.2
  rimraf: ^6.0.1

  # ---------------------------------------------------------------------------
  # 加密
  # ---------------------------------------------------------------------------
  sm-crypto: ^0.4.0
  # ---------------------------------------------------------------------------
  # Svelte & SvelteKit
  # ---------------------------------------------------------------------------
  svelte: ^5.53.5
  svelte-check: ^4.1.2
  tailwind-merge: ^3.5.0
  tailwindcss: ^4.0.0
  testcontainers: ^11.11.0

  tsup: ^8.3.5
  turbo: ^2.3.3

  # ---------------------------------------------------------------------------
  # TypeScript & 构建工具
  # ---------------------------------------------------------------------------
  typescript: ^5.7.2
  vite: ^7.3.1
  # ---------------------------------------------------------------------------
  # 测试
  # ---------------------------------------------------------------------------
  vitest: ^4.0.18
  yaml: ^2.7.0
  zod: ^4.3.6
