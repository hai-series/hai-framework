shellEmulator: true

trustPolicy: no-downgrade

# =============================================================================
# hai Framework - pnpm Workspace 配置
# =============================================================================
# 定义 Monorepo 工作区结构和依赖版本统一管理
#
# @see https://pnpm.io/workspaces
# @see https://pnpm.io/catalogs
# =============================================================================

packages:
  # 核心包
  - 'packages/*'
  # 应用
  - 'apps/*'

# =============================================================================
# 依赖版本统一管理 (Catalog)
# =============================================================================
# 使用 catalog: 协议引用统一版本，例如：
#   dependencies:
#     zod: "catalog:"
# =============================================================================
catalog:
  '@antfu/eslint-config': ^7.2.0
  # ---------------------------------------------------------------------------
  # 对象存储 (S3 协议)
  # ---------------------------------------------------------------------------
  '@aws-sdk/client-s3': ^3.723.0
  '@aws-sdk/s3-request-presigner': ^3.723.0

  '@iconify-json/tabler': ^1.2.15
  '@playwright/test': ^1.58.2
  '@sveltejs/adapter-auto': ^7.0.0
  '@sveltejs/adapter-node': ^5.0.0
  '@sveltejs/kit': ^2.15.0
  '@sveltejs/package': ^2.3.7
  '@sveltejs/vite-plugin-svelte': ^7.0.0

  # ---------------------------------------------------------------------------
  # TypeScript & 构建工具
  # ---------------------------------------------------------------------------
  typescript: ^5.7.2
  vite: ^7.3.1
  tsup: ^8.3.5
  turbo: ^2.3.3

  # ---------------------------------------------------------------------------
  # ESLint (已内置代码格式化，无需 Prettier)
  # ---------------------------------------------------------------------------
  eslint: ^9.18.0
  eslint-plugin-format: ^1.3.1

  jsdom: ^27.4.0
  testcontainers: ^11.11.0

  '@tailwindcss/vite': ^4.0.0
  daisyui: ^5.0.0
  flyonui: ^2.4.1
  '@iconify/tailwind4': ^1.0.7

  '@types/better-sqlite3': ^7.6.12
  '@types/pg': ^8.11.10
  # ---------------------------------------------------------------------------
  # 数据库
  # ---------------------------------------------------------------------------
  better-sqlite3: ^12.6.2
  mysql2: ^3.11.5
  drizzle-kit: ^0.31.8

  # ---------------------------------------------------------------------------
  # 缓存
  # ---------------------------------------------------------------------------
  ioredis: ^5.4.2

  '@noble/hashes': ^2.0.1

  '@modelcontextprotocol/sdk': ^1.0.4

  # ---------------------------------------------------------------------------
  # 日志
  # ---------------------------------------------------------------------------
  pino: ^10.3.0
  pino-pretty: ^13.0.0
  loglevel: ^1.9.2

  # ---------------------------------------------------------------------------
  # i18n
  # ---------------------------------------------------------------------------
  '@inlang/paraglide-js': ^2.0.0
  '@inlang/plugin-message-format': ^4.2.0

  # ---------------------------------------------------------------------------
  # ID 生成 & 验证 & 配置
  # ---------------------------------------------------------------------------
  nanoid: ^5.0.9
  zod: ^4.3.6
  yaml: ^2.7.0

  # ---------------------------------------------------------------------------
  # CLI 工具
  # ---------------------------------------------------------------------------
  cac: ^6.7.14
  chalk: ^5.4.1
  drizzle-orm: ^0.45.1
  ora: ^9.1.0
  '@types/prompts': ^2.4.9
  fs-extra: ^11.2.0
  '@types/fs-extra': ^11.0.4
  glob: ^13.0.0
  handlebars: ^4.7.8

  # ---------------------------------------------------------------------------
  # Git Hooks & Changesets & 其他工具
  # ---------------------------------------------------------------------------
  husky: ^9.1.7
  jose: ^6.1.3
  lint-staged: ^16.2.7
  # ---------------------------------------------------------------------------
  # AI
  # ---------------------------------------------------------------------------
  openai: ^6.17.0
  pg: ^8.13.1
  prompts: ^2.4.2
  rimraf: ^6.0.1

  # ---------------------------------------------------------------------------
  # 加密
  # ---------------------------------------------------------------------------
  sm-crypto: ^0.4.0
  # ---------------------------------------------------------------------------
  # Svelte & SvelteKit
  # ---------------------------------------------------------------------------
  svelte: ^5.16.0
  svelte-check: ^4.1.2
  # ---------------------------------------------------------------------------
  # UI (Tailwind CSS / DaisyUI / FlyonUI / Icons)
  # ---------------------------------------------------------------------------
  tailwindcss: ^4.0.0
  # ---------------------------------------------------------------------------
  # 测试
  # ---------------------------------------------------------------------------
  vitest: ^4.0.18
  # ---------------------------------------------------------------------------
  # Node.js 类型
  # ---------------------------------------------------------------------------
  '@types/node': ^25.1.0
