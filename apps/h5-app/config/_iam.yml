# =============================================================================
# H5 App - IAM 配置
# =============================================================================

login:
  password: true
  otp: false

password:
  minLength: 6
  maxLength: 128
  requireUppercase: false
  requireLowercase: false
  requireNumber: false
  requireSpecialChar: false

register:
  enabled: true
  defaultEnabled: true

session:
  # 会话超时时间（秒，默认 86400 = 24小时）
  maxAge: 3600
  # refreshToken 过期时间（秒，默认 604800 = 7天）
  refreshTokenMaxAge: 604800
  # 是否滑动窗口（每次访问刷新过期时间）
  sliding: true
  # 单设备登录（踢掉其他设备）
  singleDevice: false

rbac:
  defaultRole: user

seedDefaultData: true
