# =============================================================================
# Admin Console - IAM 配置
# =============================================================================

# 登录配置
login:
  password: true
  otp: false
  ldap: false

# 密码策略
password:
  minLength: 8
  maxLength: 128
  requireUppercase: false
  requireLowercase: false
  requireNumber: false
  requireSpecialChar: false

# 会话配置
session:
  # 会话超时时间（秒，默认 86400 = 24小时）
  maxAge: 900
  # refreshToken 过期时间（秒，默认 604800 = 7天）
  refreshTokenMaxAge: 604800
  # 是否滑动窗口（每次访问刷新过期时间）
  sliding: true
  # 单设备登录（踢掉其他设备）
  singleDevice: false

# RBAC 配置
rbac:
  defaultRole: user

# 是否自动创建默认数据（角色、权限、admin用户）
seedDefaultData: true
